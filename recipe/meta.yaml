{% set name = "sknw" %}
{% set version = "0.13" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  fn: '{{ name }}-{{ version }}.tar.gz'
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c0d3a3ecec7d1d359aa5bc42751309a6472a62c409d9ae38132990d300f049ae

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy >=1.11
    - networkx >=1.11
    - numba >=0.29

test:
  requires:
    - python {{ python_min }}
  imports:
    - sknw

about:
  home: https://github.com/yxdragon/sknw
  license: BSD 3-clause
  license_family: BSD
  license_file: 'LICENSE'
  summary: Analysis of object skeletons
  description: 'sknw: skeleton analysis in Python.'
  doc_url: 'https://github.com/yxdragon/sknw'
  dev_url: 'https://github.com/yxdragon/sknw'

extra:
  recipe-maintainers: 
    - yxdragon
